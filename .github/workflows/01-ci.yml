name: CI - Feature, Bugfix and Hotfix Validation

on:
  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'

  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Instala .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      # 3. Diagnóstico do ambiente (IMPORTANTE)
      - name: Show OS info
        run: |
          echo "=== OS INFO ==="
          uname -a

      - name: Show .NET info
        run: |
          echo "=== DOTNET INFO ==="
          dotnet --info
          echo "=== DOTNET VERSION ==="
          dotnet --version

      - name: Show locale
        run: locale

      - name: Show environment variables
        run: printenv | sort

      # 4. Restore
      - name: Restore dependencies
        run: dotnet restore src/FiapCloudGames.Catalog.slnx

      # 5. Build
      - name: Build solution
        run: dotnet build src/FiapCloudGames.Catalog.slnx --configuration Release --no-restore

      # 6. Testes (modo diagnóstico)
      - name: Run unit tests (detailed)
        run: dotnet test src/FiapCloudGames.Catalog.slnx --configuration Release --no-build --verbosity detailed --logger "console;verbosity=detailed"
